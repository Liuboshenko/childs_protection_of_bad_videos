<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="utf-8">
<link rel="icon" type="image/png" sizes="16x16" href="icons/icon16.png">
<link rel="icon" type="image/png" sizes="32x32" href="icons/icon32.png">
<style>
*{margin:0;padding:0;box-sizing:border-box}
body{width:300px;background:#0f172a;color:#e2e8f0;
  font-family:-apple-system,BlinkMacSystemFont,sans-serif;padding:16px}
h2{font-size:15px;display:flex;align-items:center;gap:8px;margin-bottom:14px}
.row{display:flex;gap:8px;margin-bottom:12px}
.box{flex:1;background:#1e293b;border-radius:8px;padding:10px;text-align:center}
.num{font-size:22px;font-weight:700;color:#38bdf8}
.lbl{font-size:11px;color:#64748b;margin-top:2px}
.row-toggle{display:flex;align-items:center;justify-content:space-between;
  margin-bottom:12px;padding:10px 12px;background:#1e293b;border-radius:8px;font-size:13px}
.switch{position:relative;display:inline-block;width:38px;height:22px;flex-shrink:0}
.switch input{opacity:0;width:0;height:0;position:absolute}
.slider{position:absolute;cursor:pointer;top:0;left:0;right:0;bottom:0;
  background:#334155;border-radius:22px;transition:.25s}
.slider:before{content:"";position:absolute;height:16px;width:16px;
  left:3px;bottom:3px;background:#64748b;border-radius:50%;transition:.25s}
input:checked+.slider{background:#0ea5e9}
input:checked+.slider:before{transform:translateX(16px);background:#fff}
.bl-status{display:flex;align-items:center;gap:8px;padding:8px 12px;
  border-radius:8px;margin-bottom:8px;font-size:12px;font-weight:500}
.bl-status.loaded{background:#052e16;color:#4ade80}
.bl-status.empty{background:#0c1a3a;color:#60a5fa}
.bl-dot{width:8px;height:8px;border-radius:50%;flex-shrink:0;transition:background .3s}
.bl-status.loaded .bl-dot{background:#22c55e;box-shadow:0 0 6px #22c55e88}
.bl-status.empty .bl-dot{background:#3b82f6}
.btn{width:100%;padding:9px;background:#334155;color:#e2e8f0;border:1px dashed #475569;
  border-radius:8px;cursor:pointer;font-size:13px;font-family:inherit}
.btn:hover{background:#475569}
input[type=file]{display:none}
.msg{margin-top:8px;padding:6px 10px;border-radius:6px;font-size:12px;display:none}
.msg.ok{display:block;background:#14532d;color:#86efac}
.msg.err{display:block;background:#7f1d1d;color:#fca5a5}
.log{margin-top:12px;max-height:140px;overflow-y:auto}
.log-title{font-size:11px;color:#64748b;text-transform:uppercase;letter-spacing:.5px;margin-bottom:6px}
.le{font-size:11px;color:#94a3b8;padding:3px 0;border-bottom:1px solid #1e293b}
</style>
</head>
<body>

<h2><img src="icons/icon32.png" width="20" height="20" style="vertical-align:middle"> Content Shield</h2>

<div class="row">
  <div class="box"><div class="num" id="nCh">-</div><div class="lbl">каналов</div></div>
  <div class="box"><div class="num" id="nBl">-</div><div class="lbl">блокировок</div></div>
</div>

<div class="row-toggle">
  <span>&#x1F3AC; Блокировать все Shorts</span>
  <label class="switch">
    <input type="checkbox" id="shortsToggle">
    <span class="slider"></span>
  </label>
</div>

<div class="bl-status empty" id="blStatus">
  <span class="bl-dot"></span>
  <span id="blText">&#8593; Чёрный список не загружен</span>
</div>
<label class="btn" for="f">&#128194; Загрузить black_list.json</label>
<input type="file" id="f" accept=".json">
<div class="msg" id="msg"></div>

<div class="log">
  <div class="log-title">Последние блокировки</div>
  <div id="log"></div>
</div>

<script src="popup.js"></script>
</body>
</html>
